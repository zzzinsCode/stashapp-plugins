name: WetAndPuffy
sceneByURL:
  - action: scrapeXPath
    url:
      - wetandpuffy.com/videos/
    scraper: sceneScraper

xPathScrapers:
  sceneScraper:
    scene:
      Title:
        selector: //h2[1]

      Details:
        # The description paragraph sits just before the tag links
        selector: //a[contains(@href, "?tag=")][1]/preceding::p[1]

      Date:
        # "Released on: <b>Feb 18, 2011</b>"
        selector: //b[preceding-sibling::text()[contains(., "Released on")]]
        postProcess:
          - parseDate: Jan 2, 2006

      Performers:
        - Name:
            selector: //a[contains(@href, "/girls/")]

      Tags:
        - Name:
            selector: //a[contains(@href, "?tag=")]

      Image:
        # Cover image is a direct img tag — src pattern: /videos/{slug}/cover/hd.jpg
        selector: //img[contains(@src, "/cover/hd.jpg")]
        attribute: src

      Studio:
        Name:
          fixed: Wet And Puffy
        URL:
          fixed: https://www.wetandpuffy.com
