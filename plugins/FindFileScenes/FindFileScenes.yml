name: FindFileScenes
description: Given a file or folder path, find all Stash scenes that contain that file or any file under that folder (recursive).
version: "1.1"
url: ""
exec:
  - python
  - "{pluginDir}/FindFileScenes.py"
interface: raw

ui:
  javascript:
    - FindFileScenes.js

tasks:
  - name: Find Scenes For File
    description: Find all scenes that contain a specific file path or folder (recursive).
    defaultArgs:
      mode: find
